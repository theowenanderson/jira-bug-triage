name: Jira Bug Triage

on:
  repository_dispatch:
    types: [jira-bug-created]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Debug payload
        run: |
          echo "Jira Key: ${{ github.event.client_payload.jira_key }}"
          echo "Summary: ${{ github.event.client_payload.summary }}"
          echo "Reporter: ${{ github.event.client_payload.reporter }}"

      - name: Create GitHub Issue
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo ${{ github.repository }} \
            --title "[${{ github.event.client_payload.jira_key }}] ${{ github.event.client_payload.summary }}" \
            --body "**Jira Ticket:** ${{ github.event.client_payload.url }}

          **Reporter:** ${{ github.event.client_payload.reporter }}
          **Priority:** ${{ github.event.client_payload.priority }}

          ---

          ${{ github.event.client_payload.description }}" \
            --label "bug")

          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          ISSUE_NUMBER=$(echo $ISSUE_URL | grep -o '[0-9]*$')
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "✅ Issue #$ISSUE_NUMBER created: $ISSUE_URL"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Copilot CLI
        run: |
          node --version
          npm install -g @github/copilot

      - name: Run Copilot analysis
        id: analysis
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          copilot -p "You are a senior engineer triaging a bug report.

          Bug ID: ${{ github.event.client_payload.jira_key }}
          Summary: ${{ github.event.client_payload.summary }}
          Description: ${{ github.event.client_payload.description }}

          Please analyze this bug and provide:
          1. Which files or modules in this repository are most likely involved
          2. Probable root causes based on the description
          3. Any recent commits that may be relevant
          4. Suggested first debugging steps

          Only read files and git history. Do not modify or create anything." \
            -s \
            --allow-tool='shell(git:*), read' \
            --no-ask-user > raw_analysis.txt

          cat > analysis.md << 'EOF'
          ## 🤖 Copilot First Response

          > Auto-generated analysis based on the bug report and repository scan.

          EOF
          cat raw_analysis.txt >> analysis.md

          echo "✅ Analysis complete"
          cat analysis.md

      - name: Post analysis as issue comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.create-issue.outputs.issue_number }} \
            --repo ${{ github.repository }} \
            --body-file analysis.md
          echo "✅ Comment posted to issue #${{ steps.create-issue.outputs.issue_number }}"